<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aether Solutions</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

/* BACKGROUND IMAGE */

body{
min-height:100vh;
color:white;

background-image:
linear-gradient(rgba(6,30,36,.45), rgba(6,30,36,.55)),
url("vlab.png");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 60px;
position:fixed;
width:100%;
transition:.3s;
z-index:1000;
}

/* ⭐ GRADIENT BAR */

.navbar::after{
content:"";
position:absolute;
left:0;
bottom:0;
width:100%;
height:3px;

background:linear-gradient(
90deg,
#00f0ff,
#2ed3e2,
#7b61ff,
#00f0ff
);

background-size:300% 100%;
animation:gradientMove 6s linear infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

.navbar.scrolled{
background:rgba(255,255,255,.9);
backdrop-filter:blur(10px);
}

.logo{
font-size:22px;
font-weight:700;
}

.logo span{
opacity:.7;
}

nav a{
margin:0 15px;
text-decoration:none;
color:#c7e4ea;
}

.demo-btn{
background:#3bd1df;
border:none;
padding:12px 22px;
border-radius:30px;
cursor:pointer;
font-weight:600;
}

.menu-toggle{
display:none;
font-size:28px;
cursor:pointer;
}

/* HERO */

.hero{
display:flex;
justify-content:space-between;
align-items:center;
padding:160px 60px 60px 60px;
min-height:100vh;
}

.hero-left{
width:45%;
}

.hero-left h1{
font-size:60px;
margin-bottom:20px;
line-height:1.1;
}

.hero-left p{
color:#b8d3d8;
margin-bottom:30px;
line-height:1.6;
}

.primary{
background:#2ed3e2;
padding:15px 30px;
border-radius:30px;
border:none;
cursor:pointer;
font-weight:600;
transition:.3s;
}

.primary:hover{
transform:translateY(-4px);
box-shadow:0 15px 30px rgba(0,0,0,.4);
}

.secondary{
background:white;
color:black;
padding:15px 30px;
border-radius:30px;
border:none;
cursor:pointer;
font-weight:600;
margin-left:10px;
}

/* MOBILE */

@media(max-width:900px){

nav{
position:absolute;
top:80px;
left:0;
background:rgba(7,37,43,.95);
width:100%;
display:none;
flex-direction:column;
text-align:center;
}

nav a{
padding:15px;
display:block;
}

nav.show{
display:flex;
}

.menu-toggle{
display:block;
}

.hero{
flex-direction:column;
text-align:center;
}

.hero-left{
width:100%;
}

}

</style>

</head>

<body>

<header class="navbar" id="navbar">

<div class="logo">AETHER <span>Solutions</span></div>

<nav id="navMenu">
<a href="index.html">Home</a>
<a href="#">About</a>
<a href="contact.html">Contacts</a>
</nav>

<div>
<button class="demo-btn">Request Demo</button>
<span class="menu-toggle" id="menuToggle">☰</span>
</div>

</header>

<section class="hero">

<div class="hero-left">

<h1>Empowering Virtual <br> Innovation Labs</h1>

<p>
Discover immersive electronics simulation, AI experimentation,
robotics prototyping, and digital engineering environments.
Build scalable interactive platforms for future innovation.
</p>

<button class="primary" id="exploreBtn">Explore Virtual Labs →</button>
<button class="secondary">View Solutions</button>

</div>

</section>

<script>

/* NAVBAR SCROLL EFFECT */

window.addEventListener("scroll", function(){

let navbar = document.getElementById("navbar");

if(window.scrollY > 50){
navbar.classList.add("scrolled");
}
else{
navbar.classList.remove("scrolled");
}

});

/* MOBILE MENU */

document.getElementById("menuToggle").onclick = function(){
document.getElementById("navMenu").classList.toggle("show");
};

/* BUTTON INTERACTION */

document.getElementById("exploreBtn").onclick = function(){
alert("Virtual Labs Section Coming Soon 🚀");
};

</script>

</body>
</html>
